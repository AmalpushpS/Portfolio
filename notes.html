<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes</title>
<style>
    /* Dark wallpaper background */
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: url('4.jpg') no-repeat center center fixed;
        background-size: cover;
        color: #222231;
    }

    /* Glass-style card */
    .card {
        background: #222231(40, 20, 70, 0.85); /* dark purple transparent */
        border-radius: 12px;
        padding: 40px 30px;
        text-align: center;
        box-shadow: 0 10px 30px rgba(0,0,0,0.7);
        backdrop-filter: blur(12px);
        max-width: 450px;
        width: 90%;
        border: 1px solid #dfafa9(128, 0, 255, 0.6);
    }

    h1 {
        color: #dfafa9; /* purple accent */
        font-size: 28px;
        margin-bottom: 20px;
    }

    p {
        font-size: 16px;
        margin-bottom: 25px;
        color: #d0d0d0;
    }

    a {
        display: block;
        margin: 8px 0;
        color: #988fa3; /* purple accent links */
        text-decoration: none;
        font-size: 16px;
        transition: 0.2s;
    }

    a:hover {
        text-decoration: underline;
        color: #ffb3ff;
    }
</style>
</head>
<body>
    <div class="card">
        <h1>Notes</h1>
        <p>Currently there are no notes. They will be uploaded soon. Till then, you can use these:</p>
        <a href="https://www.udayxd.xyz/notes/" target="_blank">https://www.udayxd.xyz/notes/</a>
        <a href="https://notes.subh.space/" target="_blank">https://notes.subh.space/</a>
        <a href="https://notes.amalpushp.space/" target="_blank">https://note.amalpushp.space/</a>

    </div>
</body>
</html>
